<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Closure Forecaster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Loan Closure Forecaster</h1>
            <button id="themeToggle" class="btn-outline">Toggle Dark Mode</button>
        </header>

        <main>
            <section class="card">
                <p class="disclaimer"><strong>Note:</strong> This calculator assumes standard compounding and does not factor in pre-closure rates, processing fees, or penalty charges. Keep it simple.</p>
                
                <div class="input-grid">
                    <div class="input-group">
                        <label for="principal">Principal Pending (₹)</label>
                        <input type="number" id="principal" placeholder="e.g., 1500000" required>
                    </div>
                    <div class="input-group">
                        <label for="roi">Rate of Interest (Annual %)</label>
                        <input type="number" id="roi" placeholder="e.g., 8.5" step="0.01" required>
                    </div>
                    <div class="input-group">
                        <label for="payment">Planned Monthly Payment (₹)</label>
                        <input type="number" id="payment" placeholder="e.g., 50000" required>
                    </div>
                    <div class="input-group">
                        <label for="startMonth">Starting Month</label>
                        <select id="startMonth">
                            <option value="0">January</option>
                            <option value="1">February</option>
                            <option value="2">March</option>
                            <option value="3">April</option>
                            <option value="4">May</option>
                            <option value="5">June</option>
                            <option value="6">July</option>
                            <option value="7">August</option>
                            <option value="8">September</option>
                            <option value="9">October</option>
                            <option value="10">November</option>
                            <option value="11">December</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="startYear">Starting Year</label>
                        <input type="number" id="startYear" required>
                    </div>
                </div>

                <div id="error-message" class="error hidden"></div>
                
                <button id="calculateBtn" class="btn-primary">Calculate Progress</button>
            </section>

            <section id="results" class="hidden">
                <div class="summary-card">
                    <h2>Estimated Closure: <span id="closureDate"></span></h2>
                    <p>Total Interest to be Paid: ₹<span id="totalInterest"></span></p>
                </div>
                
                <div class="table-container">
                    <table id="scheduleTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Opening Principal</th>
                                <th>Interest Portion</th>
                                <th>Principal Portion</th>
                                <th>Closing Principal</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
